<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carnival — Tests</title>
  <style>
    body { font-family: ui-monospace, Menlo, Consolas, monospace; background:#14122b; color:#f5f3ff; padding:16px; }
    h1 { color:#ffd14d; font-size:18px; }
    .ok { color:#3ddc97; } .fail { color:#ff5d5d; } .grp { color:#ffd14d; margin-top:12px; }
    #summary { font-size:16px; margin-top:16px; font-weight:bold; }
    pre { white-space:pre-wrap; line-height:1.5; }
  </style>
</head>
<body>
  <h1>Carnival — built-in tests</h1>
  <p class="grp">Serve over HTTP and open this page. Tests reset the save at the end.</p>
  <pre id="out"></pre>
  <div id="summary"></div>

  <script type="module">
    const out = document.getElementById('out');
    let pass = 0, fail = 0;
    const line = (cls, msg) => { out.innerHTML += `<span class="${cls}">${msg}</span>\n`; };
    const grp = (m) => line('grp', m);
    const ok = (c, m) => c ? (pass++, line('ok', '  ok   ' + m)) : (fail++, line('fail', '  FAIL ' + m));

    const { State } = await import('./js/data/State.js');
    const Prog = await import('./js/systems/Progression.js');
    const Prizes = await import('./js/systems/Prizes.js');
    const { migrate } = await import('./js/data/schema.js');
    const { makeRng } = await import('./js/core/util.js');
    const { RingToss } = await import('./js/games/RingToss.js');
    const { HighStriker } = await import('./js/games/HighStriker.js');
    const { ClawMachine } = await import('./js/games/ClawMachine.js');
    const { BBGunStar } = await import('./js/games/BBGunStar.js');
    const { RailBowling } = await import('./js/games/RailBowling.js');
    const { BasketToss } = await import('./js/games/BasketToss.js');
    const { GoldfishToss } = await import('./js/games/GoldfishToss.js');

    grp('Persistence — migrate carries tickets, drops old economy');
    const m = migrate({ version: 1, economy: { tickets: 42, coins: 5 }, stats: { plays: 7 } });
    ok(m.version === 2 && m.wallet.tickets === 42, 'old save upgrades and keeps tickets');
    ok(m.economy === undefined && m.prizes.inventory, 'energy economy gone, prizes added');
    ok(migrate('garbage').wallet !== undefined, 'garbage falls back to defaults');

    grp('Progression — tickets raise level, level gates prize tiers');
    State.reset();
    ok(State.s.progress.level === 1, 'starts at level 1');
    ok(Prog.awardTickets(80).leveledTo === 2, 'earning 80 lifetime tickets reaches level 2');
    ok(Prog.maxPrizeTier() === 2, 'level 2 unlocks prize tier 2');

    grp('Prizes — redeem, lock by level, and trade up');
    ok(Prizes.redeem('lollipop').ok && Prizes.countOf('lollipop') === 1, 'redeem a tier-1 prize');
    ok(Prizes.redeem('guitar').reason === 'locked', 'tier-3 prize locked at level 2');
    Prizes.redeem('goldfish'); Prizes.redeem('sticker');
    ok(Prizes.canTradeUp(1), 'holding 3 tier-1 prizes enables trade up');
    ok(Prizes.tradeUp(1, 'teddy').ok && Prizes.countOf('teddy') === 1, 'trade 3 tier-1 → 1 tier-2');
    ok(Prizes.tierCount(1) === 0, 'traded prizes are consumed');

    grp('Mini-game — deterministic for a fixed seed + input');
    const runRing = (seed) => {
      const g = new RingToss({ w: 400, h: 700 }, makeRng(seed));
      g.init();
      let guard = 0;
      while (!g.isDone() && guard++ < 5000) {
        if (g.phase === 'aim') { let c=false; g.handleInput({ consumeGesture: () => c?null:(c=true,{type:'flick',vx:0,vy:-2000,speed:2000}) }); }
        g.update(1/60);
      }
      return g.getResult();
    };
    ok(JSON.stringify(runRing(42)) === JSON.stringify(runRing(42)), 'same seed + input → identical result');
    ok(runRing(42).attempts === 3, 'ring toss uses all 3 rings');

    grp('High Striker — full-power swipes ring the bell');
    const runStriker = (seed) => {
      const g = new HighStriker({ w: 400, h: 700 }, makeRng(seed));
      g.init();
      let guard = 0;
      while (!g.isDone() && guard++ < 5000) {
        if (g.phase === 'aim') { let c=false; g.handleInput({ consumeGesture: () => c?null:(c=true,{type:'flick',vx:0,vy:-3000,speed:3000}) }); }
        g.update(1/60);
      }
      return g.getResult();
    };
    ok(runStriker(7).score === 30 && runStriker(7).bigWin, 'max-power swings ring the bell: 30 + bigWin');
    ok(runStriker(7).attempts === 3, 'high striker uses all 3 swings');

    grp('Claw Machine — side-view grabber runs its drops');
    const runClaw = (seed) => {
      const g = new ClawMachine({ w: 400, h: 700 }, makeRng(seed));
      g.init();
      const dropX = g.dropBtn.x + g.dropBtn.w / 2, dropY = g.dropBtn.y + g.dropBtn.h / 2;
      let guard = 0;
      while (!g.isDone() && guard++ < 20000) {
        if (g.clawPhase === 'idle') {
          let c=false; g.handleInput({ consumeGesture: () => c?null:(c=true,{type:'tap',x:dropX,y:dropY}) });
        } else {
          g.handleInput({ consumeGesture: () => null });
        }
        g.update(1/60);
      }
      return g.getResult();
    };
    ok(runClaw(1).attempts >= 1 && runClaw(1).attempts <= 5, 'claw machine uses up to 5 drops');
    ok(JSON.stringify(runClaw(1)) === JSON.stringify(runClaw(1)), 'claw result is deterministic');
    ok(runClaw(1).gameKey === 'claw', 'claw machine returns correct gameKey');

    grp('BB Gun Star — all 12 shots fire and score');
    const runBBGun = (seed) => {
      const g = new BBGunStar({ w: 400, h: 700 }, makeRng(seed));
      g.init();
      let guard = 0;
      while (!g.isDone() && guard++ < 5000) {
        if (g.phase === 'aim') {
          let c=false;
          g.handleInput({ consumeGesture: () => c?null:(c=true,{type:'tap',x:200,y:308}) });
        }
        g.update(1/60);
      }
      return g.getResult();
    };
    ok(runBBGun(1).attempts === 12, 'bb gun uses all 12 shots');
    ok(runBBGun(1).score >= 0 && runBBGun(1).score <= 10, 'bb gun score in valid range');

    grp('Rail Bowling — 3 rolls complete');
    const runRailBowl = (seed) => {
      const g = new RailBowling({ w: 400, h: 700 }, makeRng(seed));
      g.init();
      let guard = 0;
      while (!g.isDone() && guard++ < 8000) {
        if (g.phase === 'aim' && !g.ball) {
          let c=false; g.handleInput({ consumeGesture: () => c?null:(c=true,{type:'flick',vx:0,vy:-1000,speed:1000}) });
        }
        g.update(1/60);
      }
      return g.getResult();
    };
    ok(runRailBowl(1).attempts === 3, 'rail bowling uses all 3 rolls');
    ok(runRailBowl(1).score > 0, 'sweet-spot swipe clears the bump and scores');

    grp('Basket Toss — 3 throws complete');
    const runBasket = (seed) => {
      const g = new BasketToss({ w: 400, h: 700 }, makeRng(seed));
      g.init();
      let guard = 0;
      while (!g.isDone() && guard++ < 5000) {
        if (g.phase === 'aim' && !g.ball) {
          let c=false; g.handleInput({ consumeGesture: () => c?null:(c=true,{type:'flick',vx:0,vy:-1800,speed:1800}) });
        }
        g.update(1/60);
      }
      return g.getResult();
    };
    ok(runBasket(1).attempts === 3, 'basket toss uses all 3 throws');
    ok(runBasket(1).gameKey === 'basket', 'basket toss returns correct gameKey');

    grp('Goldfish Toss — 5 balls thrown');
    const runGoldfish = (seed) => {
      const g = new GoldfishToss({ w: 400, h: 700 }, makeRng(seed));
      g.init();
      let guard = 0;
      while (!g.isDone() && guard++ < 5000) {
        if (g.phase === 'aim' && !g.ball) {
          let c=false; g.handleInput({ consumeGesture: () => c?null:(c=true,{type:'flick',vx:0,vy:-1600,speed:1600}) });
        }
        g.update(1/60);
      }
      return g.getResult();
    };
    ok(runGoldfish(1).attempts === 5, 'goldfish toss uses all 5 balls');
    ok(runGoldfish(1).gameKey === 'goldfish', 'goldfish toss returns correct gameKey');

    State.reset();
    const sum = document.getElementById('summary');
    sum.textContent = `${pass} passed, ${fail} failed`;
    sum.className = fail ? 'fail' : 'ok';
  </script>
</body>
</html>
